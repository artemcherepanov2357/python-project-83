<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Анализатор страниц{% endblock %}</title>
    <meta name="description" content="📝 Это очень длинное описание страницы, которое должно быть обрезано до 200 символов с добавлением многоточия в конце. Мы пишем очень много текста, чтобы точно превысить лимит. Здесь должно быть больше двухсот символов, чтобы убедиться что наш фильтр truncate работает правильно. Добавляем еще больше текста, чтобы точно проверить обрезку. И еще немного для уверенности, что все работает как надо.">
    <!-- Подключение Bootstrap через CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
          crossorigin="anonymous">

    <!-- Дополнительные стили -->
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .container {
            max-width: 960px;
        }
    </style>
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
            Анализатор страниц
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('show_urls') }}">Сайты</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Основной контент -->
<main>
    <div class="container mt-4">
        <!-- Блок для flash-сообщений -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category or 'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Основной блок контента -->
        {% block content %}{% endblock %}
    </div>
</main>

<!-- Футер -->
<footer class="border-top py-3 mt-5 bg-light">
    <div class="container">
        <div class="text-center text-muted">
            <small>Анализатор страниц &copy; 2026</small>
        </div>
    </div>
</footer>

<!-- Подключение Bootstrap JS для работы интерактивных элементов -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous">
</script>
</body>
</html>
